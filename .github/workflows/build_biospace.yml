          <!DOCTYPE html>
          <html lang="en">
          <head>
          <meta charset="UTF-8"/>
          <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
          <title>BioSpace Monitor</title>
          <style>
          *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
          :root{
            --bg:#0A0A12;--panel:#12121E;--border:#1E1E35;
            --aurora:#00FFB3;--solar:#FF6B35;--plasma:#7B2FBE;
            --warn:#FFD93D;--danger:#FF4757;--ok:#2ED573;
            --text:#E8E8F0;--sub:#8888AA;--font:'Courier New',monospace;
          }
          body{background:var(--bg);color:var(--text);font-family:var(--font);min-height:100vh;overflow-x:hidden;padding-bottom:60px}
          .header{background:var(--panel);border-bottom:1px solid var(--border);padding:12px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:200}
          .logo{font-size:13px;font-weight:700;letter-spacing:3px;color:var(--aurora)}
          .logo span{color:var(--solar)}

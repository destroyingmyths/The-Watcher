              <div class="log-row"><span class="log-label">HR</span><input class="log-val" id="m-hr" type="number" inputmode="numeric" placeholder="72"/></div>
              <div class="log-row"><span class="log-label">SpOâ‚‚</span><input class="log-val" id="m-spo2" type="number" inputmode="numeric" placeholder="98"/></div>
              <div style="font-size:10px;color:var(--sub);margin:8px 0 4px;letter-spacing:1px">HOW DO YOU FEEL?</div>
              <div class="chips" id="modal-chips">
                <div class="chip" onclick="toggleChip(this)">Headache</div>
                <div class="chip" onclick="toggleChip(this)">Fatigue</div>
                <div class="chip" onclick="toggleChip(this)">Dizziness</div>
                <div class="chip" onclick="toggleChip(this)">Heart Pounding</div>
                <div class="chip" onclick="toggleChip(this)">Anxiety</div>
                <div class="chip" onclick="toggleChip(this)">Chest Pressure</div>
                <div class="chip" onclick="toggleChip(this)">Brain Fog</div>
                <div class="chip" onclick="toggleChip(this)">Shortness of Breath</div>
                <div class="chip" onclick="toggleChip(this)">Nausea</div>
                <div class="chip" onclick="toggleChip(this)">Tinnitus</div>
              </div>
              <textarea class="log-input" id="m-notes" rows="2" placeholder="Additional notes..."></textarea>
              <div class="log-btn-row" style="margin-top:10px">
                <button class="btn btn-solar btn-full" onclick="autoFillModal()">AUTO-FILL FROM WATCH</button>
              </div>
              <div class="log-btn-row">
                <button class="btn btn-aurora btn-full" onclick="saveModalLog()">SAVE ENTRY</button>
              </div>
            </div>
          </div>

          <script>
          // â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•
          //  STATE
          // â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•
          const state = {
            connected: false,
            hr: null, hrv: null, sdnn: null, rmssd: null, pnn50: null,
            bp: {sys: null, dia: null, map: null, pulse: null},
            spo2: null, stress: null, battery: null,
            steps: null, calories: null, dist: null,
            kp: null, wind: null, bz: null, density: null, orientation: 'N/A',
            pressure: null, humidity: null, temp: null, schumann: 7.83,
            sleep: null, apneas: 0,
            logs: JSON.parse(localStorage.getItem('bs_logs') || '[]'),
            reports: JSON.parse(localStorage.getItem('bs_reports') || '[]'),
            hrHistory: [], bpHistory: [], kpHistory: [],
            modalReason: '',
          };

          // â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•
          //  NATIVE BRIDGE
          // â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•
          window.onNativeData = function(data) {
            switch(data.type) {
              case 'status':       handleStatus(data); break;
              case 'hr':           handleHR(data); break;
              case 'bp':
              case 'bp_vendor':    handleBP(data); break;
              case 'spo2':         handleSpo2(data); break;
              case 'hrv':
              case 'hrv_vendor':   handleHRV(data); break;
              case 'stress':       handleStress(data); break;
              case 'battery':      handleBattery(data); break;
              case 'activity':     handleActivity(data); break;
              case 'sleep':        handleSleep(data); break;
              case 'firmware':     document.getElementById('dev-fw').textContent = 'Firmware: ' + data.version; break;
              case 'services':     document.getElementById('services-list').textContent = data.list; break;
              case 'scan_result':  addScanResult(data); break;
              case 'kp':           handleKp(data); break;
              case 'solar_wind':   handleSolarWind(data); break;
              case 'environment':  handleEnvironment(data); break;
              case 'schumann':     handleSchumann(data); break;
              case 'alert':        handleAlert(data); break;
              case 'raw':          console.log('RAW:', data.hex); break;
            }
          };

          // â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•
          //  HANDLERS
          // â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•
          function handleStatus(d) {
            state.connected = d.status === 'connected';
            document.getElementById('connDot').className = 'conn-dot' + (state.connected ? ' on' : '');
            document.getElementById('dev-status').textContent = d.status.charAt(0).toUpperCase() + d.status.slice(1);
            if (d.mac) document.getElementById('dev-mac').textContent = 'MAC: ' + d.mac;
          }

          function handleHR(d) {
            state.hr = d.hr;
            set('d-hr', d.hr); set('v-hr', d.hr);
            setBadge('d-hr-badge', hrStatus(d.hr));
            state.hrHistory.push({t: d.ts, v: d.hr});
            if (state.hrHistory.length > 120) state.hrHistory.shift();
            drawMiniLine('chart-hr-mini', state.hrHistory.map(x=>x.v), '#00FFB3');
            drawFullChart('chart-hr-full', state.hrHistory, 'HR', '#00FFB3', 40, 180);
          }

          function handleBP(d) {
            state.bp = {sys: d.sys, dia: d.dia, map: d.map||null, pulse: d.pulse||-1};
            const bp = d.sys + '/' + d.dia;
            set('d-bp', bp); set('v-bp', bp);
            setBadge('d-bp-badge', bpStatus(d.sys, d.dia));
            state.bpHistory.push({t: d.ts, sys: d.sys, dia: d.dia});
            if (state.bpHistory.length > 60) state.bpHistory.shift();
            drawBPChart('chart-bp-full', state.bpHistory);
          }

          function handleSpo2(d) {
            state.spo2 = d.spo2;
            set('d-spo2', d.spo2); set('v-spo2', d.spo2);
            setBadge('d-spo2-badge', spo2Status(d.spo2));
          }

          function handleHRV(d) {
            state.sdnn = d.sdnn; state.rmssd = d.rmssd; state.pnn50 = d.pnn50;
            state.hrv = d.rmssd;
            set('d-hrv', d.rmssd); set('v-sdnn', d.sdnn); set('v-rmssd', d.rmssd); set('v-pnn50', d.pnn50);
          }

          function handleStress(d) {
            state.stress = d.level;
            set('d-stress', d.level); set('v-stress', d.level);
          }

          function handleBattery(d) {
            state.battery = d.level;
            document.getElementById('battPill').textContent = d.level + '% ðŸ”‹';
            document.getElementById('dev-batt').textContent = 'Battery: ' + d.level + '%';
          }

          function handleActivity(d) {
            state.steps = d.steps; state.calories = d.calories; state.dist = d.dist_m;
            set('v-steps', d.steps); set('v-cal', d.calories); set('v-dist', d.dist_m);
          }

          function handleSleep(d) {
            state.sleep = d.stages; state.apneas = d.apnea_events;
            set('sl-apnea', d.apnea_events);
            if (d.stages && d.stages.length) {
              set('sl-total', Math.floor(d.stages.length / 60) + 'h ' + (d.stages.length % 60) + 'm');
              const spo2vals = d.stages.filter(s=>s.spo2).map(s=>s.spo2);
              if (spo2vals.length) {
                set('sl-spo2', Math.round(spo2vals.reduce((a,b)=>a+b,0)/spo2vals.length) + '%');
                set('sl-spo2-min', Math.min(...spo2vals) + '%');
              }
              drawSleepChart(d.stages);
              renderApneaList(d.stages, d.apnea_events);
            }
          }

          function handleKp(d) {
            state.kp = d.kp;
            const kp = parseFloat(d.kp).toFixed(1);
            set('d-kp', kp); set('sw-kp', kp);
            const pct = Math.min(100, (d.kp / 9) * 100);
            const color = d.kp < 4 ? 'var(--ok)' : d.kp < 6 ? 'var(--warn)' : 'var(--danger)';
            ['d-kp-bar','sw-kp-bar'].forEach(id => {
              const el = document.getElementById(id);
              if (el) { el.style.width = pct + '%'; el.style.background = color; }
            });
            const label = d.kp < 1 ? 'Quiet' : d.kp < 4 ? 'Unsettled' : d.kp < 5 ? 'Active' : d.kp < 6 ? 'Minor Storm' : d.kp < 7 ? 'Moderate Storm' : d.kp < 8 ? 'Strong Storm' : 'Severe Storm';
            set('d-kp-label', label); set('sw-kp-status', label);
            if (d.time) set('sw-kp-time', 'Updated: ' + d.time);
            ['d-kp-card'].forEach(id => {
              const el = document.getElementById(id);
              if (el) el.className = 'card full ' + (d.kp >= 6 ? 'danger' : d.kp >= 4 ? 'warn' : '');
            });
            state.kpHistory.push({t: d.ts, v: d.kp});
            if (state.kpHistory.length > 50) state.kpHistory.shift();
            drawFullChart('chart-kp', state.kpHistory, 'Kp', '#FFD93D', 0, 9);
            drawCorrChart();
          }

          function handleSolarWind(d) {
            state.wind = d.speed; state.bz = d.bz; state.density = d.density;
            state.orientation = d.orientation;
            set('d-wind', Math.round(d.speed)); set('sw-speed', Math.round(d.speed));
            set('d-bz', d.bz.toFixed(1)); set('sw-bz', d.bz.toFixed(1));
            set('sw-density', d.density.toFixed(1));
            const arrow = d.bz < 0 ? 'â¬‡ï¸' : 'â¬†ï¸';
            const label = d.bz < 0 ? 'SOUTHWARD âš ' : 'NORTHWARD âœ“';
            const color = d.bz < -5 ? 'var(--danger)' : d.bz < 0 ? 'var(--warn)' : 'var(--ok)';
            ['d-orient','sw-orient'].forEach(id => set(id, arrow));
            ['d-orient-label','sw-orient-label'].forEach(id => { const el=document.getElementById(id); if(el){el.textContent=label;el.style.color=color;}});
          }

          function handleEnvironment(d) {
            state.pressure = d.pressure_hpa; state.humidity = d.humidity; state.temp = d.temp_c;
            set('d-pressure', d.pressure_hpa.toFixed(1) + ' hPa'); set('sw-pressure', d.pressure_hpa.toFixed(1));
            set('d-humidity', d.humidity + '%'); set('sw-humidity', d.humidity);
            set('d-temp', d.temp_c.toFixed(1) + 'Â°C');
          }

          function handleSchumann(d) {
            state.schumann = d.frequency;
            set('d-sr', d.frequency); set('sw-sr', d.frequency);
          }

          function handleAlert(d) {
            const banner = document.getElementById('alertBanner');
            const text   = document.getElementById('alertText');
            const src    = d.source === 'kp' ? 'Kp=' + d.kp : 'Wind=' + Math.round(d.speed||0) + ' Bz=' + (d.bz||0).toFixed(1);
            text.textContent = (d.level === 'danger' ? 'âš  DANGER â€” ' : 'âš¡ WARNING â€” ') + src;
            banner.className = 'alert-banner show ' + d.level;
            state.modalReason = text.textContent;
          }

          function addScanResult(d) {
            const list = document.getElementById('scan-list');
            if (list.querySelector('.empty')) list.innerHTML = '';
            const existing = list.querySelector('[data-mac="' + d.mac + '"]');
            if (existing) { existing.querySelector('.scan-rssi').textContent = d.rssi + ' dBm'; return; }
            const div = document.createElement('div');
            div.className = 'scan-item'; div.setAttribute('data-mac', d.mac);
            div.innerHTML = '<div><div class="scan-name">' + (d.name||'Unknown') + '</div><div class="scan-mac">' + d.mac + '</div></div><span class="scan-rssi">' + d.rssi + ' dBm</span>';
            div.onclick = () => { if (window.AndroidBridge) AndroidBridge.connectWatch(d.mac); };
            list.prepend(div);
          }

          // â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•
          //  ACTIONS
          // â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•
          function scanDevices() { if (window.AndroidBridge) AndroidBridge.startScan(); }
          function connectKnown() { if (window.AndroidBridge) AndroidBridge.connectWatch('C0:29:AB:60:4D:10'); }
          function disconnectWatch() { if (window.AndroidBridge) AndroidBridge.disconnectWatch(); }

          function reqMeasure(type) {
            if (!window.AndroidBridge) return;
            switch(type) {
              case 'bp':     AndroidBridge.requestBP(); break;
              case 'hrv':    AndroidBridge.requestHRV(); break;
              case 'stress': AndroidBridge.requestStress(); break;
              case 'spo2':   AndroidBridge.requestSpo2(); break;
              case 'sleep':  AndroidBridge.requestSleep(); break;
            }
          }

          function sendWatchMsg() {
            const msg = document.getElementById('watch-msg').value;
            if (!msg) return;
            if (window.AndroidBridge) AndroidBridge.sendWatchNotif(msg);
          }

          function showTab(id) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.getElementById('tab-' + id).classList.add('active');
            event.target.classList.add('active');
          }

          function toggleChip(el) { el.classList.toggle('selected'); }

          function getSelectedChips(containerId) {
            return Array.from(document.querySelectorAll('#' + containerId + ' .chip.selected')).map(c => c.textContent);
          }

          // â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•
          //  LOGGING
          // â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•
          function autoFillFromWatch() {
            if (state.bp.sys) { document.getElementById('log-sys').value = state.bp.sys; document.getElementById('log-dia').value = state.bp.dia; }
            if (state.hr) document.getElementById('log-hr').value = state.hr;
            if (state.spo2) document.getElementById('log-spo2').value = state.spo2;
            if (state.stress) document.getElementById('log-stress').value = state.stress;
          }

          function autoFillModal() {
            if (state.bp.sys) { document.getElementById('m-sys').value = state.bp.sys; document.getElementById('m-dia').value = state.bp.dia; }
            if (state.hr) document.getElementById('m-hr').value = state.hr;
            if (state.spo2) document.getElementById('m-spo2').value = state.spo2;
          }

          function saveLog() {
            const entry = buildEntry(
              document.getElementById('log-sys').value,
              document.getElementById('log-dia').value,
              document.getElementById('log-hr').value,
              document.getElementById('log-spo2').value,
              document.getElementById('log-stress').value,
              getSelectedChips('symptom-chips'),
              document.getElementById('log-notes').value,
              'manual'
            );
            pushLog(entry);
            document.querySelectorAll('#symptom-chips .chip').forEach(c=>c.classList.remove('selected'));
            document.getElementById('log-notes').value = '';
            alert('Entry saved!');
          }

          function saveModalLog() {
            const entry = buildEntry(
              document.getElementById('m-sys').value,
              document.getElementById('m-dia').value,
              document.getElementById('m-hr').value,
              document.getElementById('m-spo2').value,
              '',
              getSelectedChips('modal-chips'),
              document.getElementById('m-notes').value,
              state.modalReason || 'space_weather'
            );
            pushLog(entry);
            closeLogModal();
            alert('Entry saved!');
          }

          function buildEntry(sys, dia, hr, spo2, stress, symptoms, notes, trigger) {
            return {
              ts: Date.now(),
              dt: new Date().toLocaleString(),
              sys: sys||null, dia: dia||null, hr: hr||null,
              spo2: spo2||null, stress: stress||null,
              symptoms, notes, trigger,
              env: { kp: state.kp, wind: state.wind, bz: state.bz,
                     pressure: state.pressure, humidity: state.humidity, schumann: state.schumann }
            };
          }

          function pushLog(entry) {
            state.logs.unshift(entry);
            if (state.logs.length > 500) state.logs.pop();
            localStorage.setItem('bs_logs', JSON.stringify(state.logs));
            renderLogList();
          }

          function renderLogList() {
            const list = document.getElementById('log-list');
            if (!state.logs.length) { list.innerHTML = '<div class="empty"><div class="big">ðŸ“‹</div>No entries yet.</div>'; return; }
            list.innerHTML = state.logs.slice(0, 20).map(e => `
              <div class="report-item">
                <div class="rdate">${e.dt} Â· ${e.trigger}</div>
                <div class="rtitle">BP ${e.sys||'?'}/${e.dia||'?'} Â· HR ${e.hr||'?'} Â· SpOâ‚‚ ${e.spo2||'?'}%</div>
                <div class="rtags">${(e.symptoms||[]).map(s=>'<span class="rtag">'+s+'</span>').join('')}</div>
                ${e.notes?'<div style="font-size:10px;color:var(--sub);margin-top:4px">'+e.notes+'</div>':''}
                <div style="font-size:9px;color:var(--sub);margin-top:4px">Kp:${(e.env&&e.env.kp)||'?'} Wind:${(e.env&&Math.round(e.env.wind))||'?'} Bz:${(e.env&&e.env.bz)||'?'}</div>
              </div>`).join('');
          }

          // â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•
          //  REPORTS
          // â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•
          function generateReport(type) {
            const out = document.getElementById('report-output');
            if (!state.logs.length) { out.innerHTML = '<div class="empty">No log data yet.</div>'; return; }
            let html = '';
            const now = Date.now();
            const dayMs = 86400000;
            if (type === 'daily') {
              const today = state.logs.filter(l => now - l.ts < dayMs);
              html = reportHTML('Daily Report', today, state);
            } else if (type === 'weekly') {
              const week = state.logs.filter(l => now - l.ts < 7 * dayMs);
              html = reportHTML('Weekly Report', week, state);
            } else if (type === 'correlation') {
              html = correlationReport(state.logs, state);
            } else if (type === 'sleep') {
              html = sleepReport(state);
            }
            out.innerHTML = html;
            const saved = { ts: Date.now(), dt: new Date().toLocaleDateString(), type, html };
            state.reports.unshift(saved);
            localStorage.setItem('bs_reports', JSON.stringify(state.reports.slice(0,50)));
            renderReportList();
          }

          function reportHTML(title, logs, state) {
            if (!logs.length) return '<div class="empty">No data for this period.</div>';
            const bps = logs.filter(l=>l.sys&&l.dia);
            const hrs  = logs.filter(l=>l.hr);
            const syms = {};
            logs.forEach(l=>(l.symptoms||[]).forEach(s=>{syms[s]=(syms[s]||0)+1;}));
            const avgSys = bps.length ? Math.round(bps.reduce((a,l)=>a+parseFloat(l.sys),0)/bps.length) : '?';
            const avgDia = bps.length ? Math.round(bps.reduce((a,l)=>a+parseFloat(l.dia),0)/bps.length) : '?';
            const avgHr  = hrs.length  ? Math.round(hrs.reduce((a,l)=>a+parseFloat(l.hr),0)/hrs.length)   : '?';
            const symList = Object.entries(syms).sort((a,b)=>b[1]-a[1]).map(([k,v])=>`${k}(${v})`).join(', ');
            return `<div class="chart-container">
              <div class="stitle">${title} â€” ${new Date().toLocaleDateString()}</div>
              <div class="grid3" style="margin:0 0 10px">
                <div class="card"><div class="clabel">AVG BP</div><div class="cval sm">${avgSys}/${avgDia}</div></div>
                <div class="card"><div class="clabel">AVG HR</div><div class="cval sm">${avgHr}</div></div>
                <div class="card"><div class="clabel">ENTRIES</div><div class="cval sm">${logs.length}</div></div>
              </div>
              <div style="font-size:10px;color:var(--sub);margin-bottom:6px">TOP SYMPTOMS: <span style="color:var(--warn)">${symList||'None'}</span></div>
              <div style="font-size:10px;color:var(--sub)">Space Weather: Avg Kp ${avgKp(logs)} Â· Avg Wind ${avgWind(logs)} km/s</div>
            </div>`;
          }

          function correlationReport(logs, state) {
            const events = logs.filter(l=>l.env&&l.env.kp>=4);
            return `<div class="chart-container">
              <div class="stitle">SPACE WX CORRELATION REPORT</div>
              <div style="font-size:11px;color:var(--text);margin-bottom:10px">
                During ${events.length} high-Kp events (Kpâ‰¥4):
              </div>
              ${events.map(e=>`
                <div class="report-item">
                  <div class="rdate">${e.dt}</div>
                  <div class="rtitle">BP ${e.sys||'?'}/${e.dia||'?'} Â· HR ${e.hr||'?'}</div>
                  <div style="font-size:10px;color:var(--warn)">Kp: ${e.env.kp} Â· Wind: ${Math.round(e.env.wind||0)} km/s Â· Bz: ${(e.env.bz||0).toFixed(1)} nT</div>
                  <div class="rtags">${(e.symptoms||[]).map(s=>'<span class="rtag">'+s+'</span>').join('')}</div>
                </div>`).join('')}
            </div>`;
          }

          function sleepReport(state) {
            return `<div class="chart-container">
              <div class="stitle">SLEEP + APNEA REPORT</div>
              <div class="grid2" style="margin:0 0 10px">
                <div class="card danger"><div class="clabel">APNEA EVENTS</div><div class="cval">${state.apneas}</div><div class="cunit">DETECTED DROPS</div></div>
                <div class="card"><div class="clabel">MIN SpOâ‚‚</div><div class="cval" id="rep-spo2-min">--</div></div>
              </div>
              <div style="font-size:10px;color:var(--sub)">
                Apnea events are inferred from SpOâ‚‚ drops below 90% during sleep combined with awake-stage detection.<br/>
                This is for personal monitoring only â€” consult a physician for clinical diagnosis.
              </div>
            </div>`;
          }

          function avgKp(logs) {
            const kps = logs.filter(l=>l.env&&l.env.kp!=null).map(l=>parseFloat(l.env.kp));
            return kps.length ? (kps.reduce((a,b)=>a+b,0)/kps.length).toFixed(1) : '?';
          }
          function avgWind(logs) {
            const ws = logs.filter(l=>l.env&&l.env.wind).map(l=>parseFloat(l.env.wind));
            return ws.length ? Math.round(ws.reduce((a,b)=>a+b,0)/ws.length) : '?';
          }

          function renderReportList() {
            const list = document.getElementById('report-list');
            if (!state.reports.length) return;
            list.innerHTML = state.reports.slice(0,10).map(r=>`
              <div class="report-item" onclick="this.nextElementSibling.style.display=this.nextElementSibling.style.display==='none'?'block':'none'">
                <div class="rdate">${r.dt}</div>
                <div class="rtitle">${r.type.charAt(0).toUpperCase()+r.type.slice(1)} Report</div>
              </div>
              <div style="display:none">${r.html}</div>`).join('');
          }

          // â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•
          //  MODAL
          // â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•
          function openLogModal(reason) {
            state.modalReason = reason;
            document.getElementById('modal-reason').textContent =
              reason === 'manual' ? 'Manual entry' : ('Triggered by: ' + reason);
            document.getElementById('logModal').classList.add('show');
          }
          function closeLogModal() { document.getElementById('logModal').classList.remove('show'); }

          // â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•
          //  STATUS HELPERS
          // â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•
          function hrStatus(hr) {
            if (!hr) return {text:'â€”',cls:'badge-ok'};
            if (hr < 50) return {text:'BRADYCARDIA',cls:'badge-danger'};
            if (hr > 100) return {text:'TACHYCARDIA',cls:'badge-warn'};
            return {text:'NORMAL',cls:'badge-ok'};
          }
          function bpStatus(sys, dia) {
            if (!sys) return {text:'â€”',cls:'badge-ok'};
            if (sys >= 180 || dia >= 120) return {text:'CRISIS',cls:'badge-danger'};
            if (sys >= 140 || dia >= 90)  return {text:'HIGH',cls:'badge-warn'};
            if (sys >= 130 || dia >= 80)  return {text:'ELEVATED',cls:'badge-warn'};
            if (sys < 90  || dia < 60)    return {text:'LOW',cls:'badge-danger'};
            return {text:'NORMAL',cls:'badge-ok'};
          }
          function spo2Status(v) {
            if (!v) return {text:'â€”',cls:'badge-ok'};
            if (v < 90) return {text:'CRITICAL',cls:'badge-danger'};
            if (v < 94) return {text:'LOW',cls:'badge-warn'};
            return {text:'NORMAL',cls:'badge-ok'};
          }
          function setBadge(id, s) {
            const el = document.getElementById(id);
            if (el) { el.textContent = s.text; el.className = 'cbadge ' + s.cls; }
          }

          // â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•
          //  CANVAS CHARTS
          // â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•
          function drawMiniLine(canvasId, vals, color) {
            const c = document.getElementById(canvasId);
            if (!c || vals.length < 2) return;
            const ctx = c.getContext('2d');
            c.width = c.offsetWidth; c.height = c.offsetHeight;
            const min = Math.min(...vals) - 5, max = Math.max(...vals) + 5;
            const w = c.width, h = c.height;
            ctx.clearRect(0,0,w,h);
            ctx.strokeStyle = color; ctx.lineWidth = 1.5; ctx.lineJoin = 'round';
            ctx.beginPath();
            vals.forEach((v,i) => {
              const x = (i/(vals.length-1))*w;
              const y = h - ((v-min)/(max-min))*h;
              i===0 ? ctx.moveTo(x,y) : ctx.lineTo(x,y);
            });
            ctx.stroke();
          }

          function drawFullChart(canvasId, history, label, color, yMin, yMax) {
            const c = document.getElementById(canvasId);
            if (!c || history.length < 2) return;
            const ctx = c.getContext('2d');
            c.width = c.offsetWidth; c.height = c.offsetHeight;
            const vals = history.map(h=>h.v);
            const min = yMin !== undefined ? yMin : Math.min(...vals) - 5;
            const max = yMax !== undefined ? yMax : Math.max(...vals) + 5;
            const w = c.width, h = c.height, pad = 20;
            ctx.clearRect(0,0,w,h);
            // Grid
            ctx.strokeStyle = '#1E1E35'; ctx.lineWidth = 1;
            [0.25,0.5,0.75].forEach(frac => {
              ctx.beginPath(); ctx.moveTo(pad,h*frac); ctx.lineTo(w,h*frac); ctx.stroke();
            });
            // Fill
            const gradient = ctx.createLinearGradient(0,0,0,h);
            gradient.addColorStop(0, color + '33');
            gradient.addColorStop(1, color + '00');
            ctx.beginPath();
            vals.forEach((v,i) => {
              const x = pad + (i/(vals.length-1))*(w-pad);
              const y = h - ((v-min)/(max-min))*(h-pad);
              i===0 ? ctx.moveTo(x,y) : ctx.lineTo(x,y);
            });
            ctx.lineTo(w, h); ctx.lineTo(pad,h); ctx.closePath();
            ctx.fillStyle = gradient; ctx.fill();
            // Line
            ctx.strokeStyle = color; ctx.lineWidth = 2; ctx.lineJoin = 'round';
            ctx.beginPath();
            vals.forEach((v,i) => {
              const x = pad + (i/(vals.length-1))*(w-pad);
              const y = h - ((v-min)/(max-min))*(h-pad);
              i===0 ? ctx.moveTo(x,y) : ctx.lineTo(x,y);
            });
            ctx.stroke();
            // Labels
            ctx.fillStyle = '#8888AA'; ctx.font = '9px Courier New';
            ctx.fillText(max, 0, 10); ctx.fillText(min, 0, h-2);
          }

          function drawBPChart(canvasId, history) {
            const c = document.getElementById(canvasId);
            if (!c || history.length < 2) return;
            const ctx = c.getContext('2d');
            c.width = c.offsetWidth; c.height = c.offsetHeight;
            const w = c.width, h = c.height;
            ctx.clearRect(0,0,w,h);
            const allVals = history.map(h=>h.sys).concat(history.map(h=>h.dia));
            const min = Math.min(...allVals) - 5, max = Math.max(...allVals) + 5;
            ['sys','dia'].forEach((key, ki) => {
              const color = ki===0 ? '#FF6B35' : '#7B2FBE';
              ctx.strokeStyle = color; ctx.lineWidth = 2; ctx.lineJoin = 'round';
              ctx.beginPath();
              history.forEach((p,i) => {
                const x = (i/(history.length-1))*w;
                const y = h - ((p[key]-min)/(max-min))*h;
                i===0 ? ctx.moveTo(x,y) : ctx.lineTo(x,y);
              });
              ctx.stroke();
            });
            ctx.fillStyle = '#8888AA'; ctx.font = '9px Courier New';
            ctx.fillText('SYS', 4, 12); ctx.fillStyle='#7B2FBE'; ctx.fillText('DIA', 30, 12);
          }

          function drawSleepChart(stages) {
            const c = document.getElementById('chart-sleep');
            if (!c || !stages.length) return;
            const ctx = c.getContext('2d');
            c.width = c.offsetWidth; c.height = c.offsetHeight;
            const w = c.width, h = c.height;
            ctx.clearRect(0,0,w,h);
            const colors = ['#FF4757','#1E4E8C','#00FFB3','#7B2FBE']; // awake,light,deep,REM
            const bw = w / stages.length;
            stages.forEach((s,i) => {
              ctx.fillStyle = colors[Math.min(s.s, 3)] + 'CC';
              const bh = ((s.s+1)/4)*h;
              ctx.fillRect(i*bw, h-bh, bw-1, bh);
            });
          }

          function drawCorrChart() {
            const c = document.getElementById('chart-corr');
            if (!c || state.kpHistory.length < 2) return;
            drawFullChart('chart-corr', state.kpHistory, 'Kp', '#FFD93D', 0, 9);
          }

          function renderApneaList(stages, count) {
            const list = document.getElementById('apnea-list');
            if (!count) { list.innerHTML = '<div class="empty"><div class="big">âœ…</div>No apnea events detected.</div>'; return; }
            let prev = 98; const events = [];
            stages.forEach((s,i) => {
              if (s.spo2 && s.spo2 < 90 && prev >= 90) events.push({min: s.m, spo2: s.spo2});
              if (s.spo2) prev = s.spo2;
            });
            list.innerHTML = '<div style="font-size:10px;color:var(--danger);margin-bottom:8px">âš  ' + count + ' potential apnea event(s) detected</div>'
              + events.map(e=>`<div class="report-item"><div class="rdate">Sleep minute ${e.min}</div><div class="rtitle">SpOâ‚‚ dropped to ${e.spo2}%</div></div>`).join('');
          }

          // â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•
          //  UTILS
          // â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•
          function set(id, val) {
            const el = document.getElementById(id);
            if (el && val !== undefined && val !== null) el.textContent = val;
          }

          // Init
          renderLogList();
          renderReportList();
          </script>
          </body>
          </html>
          HTMLEOF

      - name: Build APK
        run: |
          cd BioSpace
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v3
        with:
          name: BioSpace-Monitor-debug.apk
          path: BioSpace/app/build/outputs/apk/debug/app-debug.apk

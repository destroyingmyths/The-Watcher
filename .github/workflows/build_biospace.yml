          .card.solar{border-color:rgba(255,107,53,0.3);box-shadow:0 0 16px rgba(255,107,53,0.06)}
          .card.plasma{border-color:rgba(123,47,190,0.3);box-shadow:0 0 16px rgba(123,47,190,0.06)}
          .card.warn{border-color:rgba(255,217,61,0.4);box-shadow:0 0 16px rgba(255,217,61,0.08)}

          .scroll-x::-webkit-scrollbar{display:none}
          /* Empty state */
          .empty{text-align:center;padding:40px 20px;color:var(--sub);font-size:11px;letter-spacing:1px}
          .empty .big{font-size:36px;margin-bottom:10px}
          </style>

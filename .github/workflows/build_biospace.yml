          .batt-pill{font-size:10px;color:var(--sub);letter-spacing:1px}
          .conn-dot{width:8px;height:8px;border-radius:50%;background:var(--danger)}
          .conn-dot.on{background:var(--ok);box-shadow:0 0 6px var(--ok)}
          /* Alert banner */
          .alert-banner{padding:10px 16px;font-size:11px;letter-spacing:0.5px;display:none;border-bottom:1px solid transparent}
          .alert-banner.show{display:flex;align-items:center;gap:10px}
          .alert-banner.warn{background:rgba(255,217,61,0.1);border-color:var(--warn);color:var(--warn)}
          .alert-banner.danger{background:rgba(255,71,87,0.12);border-color:var(--danger);color:var(--danger)}
          .alert-banner .log-btn{margin-left:auto;padding:4px 12px;border:1px solid currentColor;border-radius:12px;font-size:10px;cursor:pointer;background:transparent;color:inherit;letter-spacing:1px}
          /* Tabs */
          .tabs{display:flex;background:var(--panel);border-bottom:1px solid var(--border);overflow-x:auto;-webkit-overflow-scrolling:touch}
          .tabs::-webkit-scrollbar{display:none}
          .tab{flex:0 0 auto;padding:10px 14px;font-size:10px;letter-spacing:1px;color:var(--sub);cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap}
          .tab.active{color:var(--aurora);border-bottom-color:var(--aurora)}
          /* Sections */
          .section{display:none;padding:14px}

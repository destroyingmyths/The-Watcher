        run: |
          cat > BioSpace/app/src/main/java/com/biospace/monitor/BootReceiver.java << 'EOF'
          package com.biospace.monitor;
          import android.content.*;
          public class BootReceiver extends BroadcastReceiver {
              @Override
              public void onReceive(Context ctx, Intent intent) {
                  if (Intent.ACTION_BOOT_COMPLETED.equals(intent.getAction())) {
                      ctx.startForegroundService(new Intent(ctx, BleService.class));
                      ctx.startForegroundService(new Intent(ctx, SpaceWeatherService.class));
                  }
              }
          }

      - name: Write biospace.html (UI)
        run: |
          cat > BioSpace/app/src/main/assets/biospace.html << 'HTMLEOF'
          <!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
          <style>
            body{background:#0A0A12;color:#E0E0E0;font-family:sans-serif;padding:15px}
            .grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
            .card{background:#12121E;border:1px solid #1E1E35;padding:15px;border-radius:12px;margin-bottom:10px}
            .val{font-size:22px;color:#00FFB3;font-family:monospace}
            .label{font-size:11px;color:#9090A0;text-transform:uppercase}
            button{width:100%;padding:10px;background:#1E1E35;color:#00FFB3;border:1px solid #00FFB3;border-radius:8px;margin-top:5px}
          </style></head><body>
          <h3>BioSpace Monitor</h3>
          <div id="status" style="font-size:10px;margin-bottom:10px">DISCONNECTED</div>
          <div class="grid">
            <div class="card"><div class="label">BP</div><div class="val" id="bp">--/--</div></div>
            <div class="card"><div class="label">HR</div><div class="val" id="hr">--</div></div>
            <div class="card"><div class="label">Kp-Index</div><div class="val" id="kp">--</div></div>
            <div class="card"><div class="label">Wind</div><div class="val" id="wind">--</div></div>
          </div>
          <button onclick="AndroidBridge.startScan()">SCAN FOR WATCH</button>
          <div id="device-list" style="margin-top:10px"></div>
          <script>
            window.onNativeData = (d) => {
              if(typeof d==='string') d=JSON.parse(d);
              if(d.type==='bp') document.getElementById('bp').textContent=d.sys+'/'+d.dia;
              if(d.type==='hr') document.getElementById('hr').textContent=d.hr;
              if(d.type==='kp') document.getElementById('kp').textContent=d.kp;
              if(d.type==='solar_wind') document.getElementById('wind').textContent=Math.round(d.speed);
              if(d.type==='status') document.getElementById('status').textContent=d.status.toUpperCase();
              if(d.type==='scan_result') {
                let btn = document.createElement('button');
                btn.textContent = (d.name||'Watch')+' ('+d.mac+')';
                btn.onclick = () => AndroidBridge.connectWatch(d.mac);
                document.getElementById('device-list').appendChild(btn);
              }
            };
          </script></body></html>
          HTMLEOF


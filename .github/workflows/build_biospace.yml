name: Build Biospace Monitor
APK
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Create project structure
        run: |
          mkdir -p BioSpace/app/src/main/java/com/biospace/monitor
          mkdir -p BioSpace/app/src/main/res/layout
          mkdir -p BioSpace/app/src/main/res/values
          mkdir -p BioSpace/app/src/main/res/drawable
          mkdir -p BioSpace/app/src/main/assets
          mkdir -p BioSpace/gradle/wrapper

      - name: Write settings.gradle
        run: |
          cat > BioSpace/settings.gradle << 'EOF'
          pluginManagement {
              repositories {
                  google()
                  mavenCentral()
                  gradlePluginPortal()
              }
          }
          dependencyResolutionManagement {
              repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
              repositories {
                  google()
                  mavenCentral()
              }
          }
          rootProject.name = "BioSpace"
          include ':app'
          EOF

      - name: Write root build.gradle
        run: |
          cat > BioSpace/build.gradle << 'EOF'
          plugins {
              id 'com.android.application' version '8.1.0' apply false
          }
          EOF

      - name: Write gradle.properties
        run: |
          cat > BioSpace/gradle.properties << 'EOF'
          org.gradle.jvmargs=-Xmx2048m -Dfile.encoding=UTF-8
          android.useAndroidX=true
          android.enableJetifier=true
          EOF

      - name: Write gradle-wrapper.properties
        run: |
          cat > BioSpace/gradle/wrapper/gradle-wrapper.properties << 'EOF'
          distributionBase=GRADLE_USER_HOME
          distributionPath=wrapper/dists
          distributionUrl=https\://services.gradle.org/distributions/gradle-8.0-bin.zip
          zipStoreBase=GRADLE_USER_HOME
          zipStorePath=wrapper/dists
          EOF

      - name: Download gradlew
        run: |
          cd BioSpace
          curl -L https://raw.githubusercontent.com/gradle/gradle/v8.0.0/gradlew -o gradlew
          chmod +x gradlew

      - name: Write app build.gradle
        run: |
          cat > BioSpace/app/build.gradle << 'EOF'
          plugins {
              id 'com.android.application'
          }
          android {
              namespace 'com.biospace.monitor'
              compileSdk 34
              defaultConfig {
                  applicationId "com.biospace.monitor"
                  minSdk 26
                  targetSdk 34
                  versionCode 1
                  versionName "1.0"
              }
              buildTypes {
                  debug {
                      debuggable true
                  }
                  release {
                      minifyEnabled false
                      proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
                  }
              }
              compileOptions {
                  sourceCompatibility JavaVersion.VERSION_1_8
                  targetCompatibility JavaVersion.VERSION_1_8
              }
          }
          dependencies {
              implementation 'androidx.appcompat:appcompat:1.6.1'
              implementation 'androidx.core:core:1.12.0'
          }
          EOF

      - name: Write AndroidManifest.xml
        run: |
          cat > BioSpace/app/src/main/AndroidManifest.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android"
              package="com.biospace.monitor">

              <uses-permission android:name="android.permission.BLUETOOTH" android:maxSdkVersion="30"/>
              <uses-permission android:name="android.permission.BLUETOOTH_ADMIN" android:maxSdkVersion="30"/>
              <uses-permission android:name="android.permission.BLUETOOTH_SCAN" android:usesPermissionFlags="neverForLocation"/>
              <uses-permission android:name="android.permission.BLUETOOTH_CONNECT"/>
              <uses-permission android:name="android.permission.ACCESS_FINE_LOCATION"/>
              <uses-permission android:name="android.permission.ACCESS_COARSE_LOCATION"/>
              <uses-permission android:name="android.permission.INTERNET"/>
              <uses-permission android:name="android.permission.ACCESS_NETWORK_STATE"/>
              <uses-permission android:name="android.permission.WAKE_LOCK"/>
              <uses-permission android:name="android.permission.FOREGROUND_SERVICE"/>
              <uses-permission android:name="android.permission.FOREGROUND_SERVICE_CONNECTED_DEVICE"/>
              <uses-permission android:name="android.permission.FOREGROUND_SERVICE_DATA_SYNC"/>
              <uses-permission android:name="android.permission.POST_NOTIFICATIONS"/>
              <uses-permission android:name="android.permission.RECEIVE_BOOT_COMPLETED"/>
              <uses-permission android:name="android.permission.VIBRATE"/>
              <uses-permission android:name="android.permission.SCHEDULE_EXACT_ALARM"/>
              <uses-permission android:name="android.permission.USE_EXACT_ALARM"/>
              <uses-permission android:name="android.permission.WRITE_EXTERNAL_STORAGE" android:maxSdkVersion="28"/>
              <uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE" android:maxSdkVersion="32"/>

              <uses-feature android:name="android.hardware.bluetooth_le" android:required="true"/>

              <application
                  android:allowBackup="true"
                  android:icon="@drawable/ic_launcher"
                  android:label="@string/app_name"
                  android:theme="@style/Theme.BioSpace"
                  android:usesCleartextTraffic="true">

                  <activity
                      android:name=".MainActivity"
                      android:exported="true"
                      android:screenOrientation="portrait">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN"/>
                          <category android:name="android.intent.category.LAUNCHER"/>
                      </intent-filter>
                  </activity>

                  <service
                      android:name=".BleService"
                      android:enabled="true"
                      android:exported="false"
                      android:foregroundServiceType="connectedDevice"/>

                  <service
                      android:name=".SpaceWeatherService"
                      android:enabled="true"
                      android:exported="false"
                      android:foregroundServiceType="dataSync"/>

                  <receiver
                      android:name=".BootReceiver"
                      android:enabled="true"
                      android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.BOOT_COMPLETED"/>
                      </intent-filter>
                  </receiver>

                  <receiver
                      android:name=".NotificationActionReceiver"
                      android:enabled="true"
                      android:exported="false">
                      <intent-filter>
                          <action android:name="com.biospace.ACTION_LOG_NOW"/>
                          <action android:name="com.biospace.ACTION_DISMISS"/>
                      </intent-filter>
                  </receiver>

              </application>
          </manifest>
          EOF

      - name: Write MainActivity.java
        run: |
          cat > BioSpace/app/src/main/java/com/biospace/monitor/MainActivity.java << 'EOF'
          package com.biospace.monitor;
          import android.Manifest;
          import android.annotation.SuppressLint;
          import android.app.Activity;
          import android.content.BroadcastReceiver;
          import android.content.Context;
          import android.content.Intent;
          import android.content.IntentFilter;
          import android.content.pm.PackageManager;
          import android.os.Build;
          import android.os.Bundle;
          import android.webkit.JavascriptInterface;
          import android.webkit.WebSettings;
          import android.webkit.WebView;
          import android.webkit.WebViewClient;
          import androidx.core.app.ActivityCompat;
          public class MainActivity extends Activity {
              private WebView webView;
              private BroadcastReceiver dataReceiver;
              private static final int PERM_REQ = 101;

              @SuppressLint("SetJavaScriptEnabled")
              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  setContentView(R.layout.activity_main);
                  requestAllPermissions();
                  webView = findViewById(R.id.webView);
                  WebSettings s = webView.getSettings();
                  s.setJavaScriptEnabled(true);
                  s.setDomStorageEnabled(true);
                  s.setAllowFileAccessFromFileURLs(true);
                  s.setAllowUniversalAccessFromFileURLs(true);
                  s.setCacheMode(WebSettings.LOAD_NO_CACHE);
                  webView.setWebViewClient(new WebViewClient());
                  webView.addJavascriptInterface(new Bridge(), "AndroidBridge");
                  webView.loadUrl("file:///android_asset/biospace.html");
                  dataReceiver = new BroadcastReceiver() {
                      @Override public void onReceive(Context ctx, Intent intent) {
                          String json = intent.getStringExtra("json");
                          if (json != null) pushToWeb(json);
                      }
                  };
                  IntentFilter filter = new IntentFilter();
                  filter.addAction("com.biospace.WATCH_DATA");
                  filter.addAction("com.biospace.SPACE_WEATHER");
                  filter.addAction("com.biospace.ALERT");
                  if (Build.VERSION.SDK_INT >= 26) {
                      registerReceiver(dataReceiver, filter, Context.RECEIVER_NOT_EXPORTED);
                  } else {
                      registerReceiver(dataReceiver, filter);
                  }
                  startService(new Intent(this, BleService.class));
                  startService(new Intent(this, SpaceWeatherService.class));
              }

              private void requestAllPermissions() {
                  String[] perms = {
                      Manifest.permission.ACCESS_FINE_LOCATION,
                      Manifest.permission.ACCESS_COARSE_LOCATION,
                      Manifest.permission.BLUETOOTH_SCAN,
                      Manifest.permission.BLUETOOTH_CONNECT,
                      Manifest.permission.POST_NOTIFICATIONS
                  };
                  ActivityCompat.requestPermissions(this, perms, PERM_REQ);
              }

              public void pushToWeb(String json) {
                  runOnUiThread(() ->
                      webView.evaluateJavascript("window.onNativeData&&window.onNativeData(" + json + ")", null)
                  );
              }

              class Bridge {
                  @JavascriptInterface public void connectWatch(String mac) {
                      Intent i = new Intent(MainActivity.this, BleService.class);
                      i.putExtra("mac", mac); i.setAction("CONNECT"); startService(i);
                  }
                  @JavascriptInterface public void disconnectWatch() {
                      Intent i = new Intent(MainActivity.this, BleService.class);
                      i.setAction("DISCONNECT"); startService(i);
                  }
                  @JavascriptInterface public void requestBP() {
                      Intent i = new Intent(MainActivity.this, BleService.class);
                      i.setAction("REQUEST_BP"); startService(i);
                  }
                  @JavascriptInterface public void requestHRV() {
                      Intent i = new Intent(MainActivity.this, BleService.class);
                      i.setAction("REQUEST_HRV"); startService(i);
                  }
                  @JavascriptInterface public void requestStress() {
                      Intent i = new Intent(MainActivity.this, BleService.class);
                      i.setAction("REQUEST_STRESS"); startService(i);
                  }
                  @JavascriptInterface public void requestSpo2() {
                      Intent i = new Intent(MainActivity.this, BleService.class);
                      i.setAction("REQUEST_SPO2"); startService(i);
                  }
                  @JavascriptInterface public void requestSleep() {
                      Intent i = new Intent(MainActivity.this, BleService.class);
                      i.setAction("REQUEST_SLEEP"); startService(i);
                  }
                  @JavascriptInterface public void startScan() {
                      Intent i = new Intent(MainActivity.this, BleService.class);
                      i.setAction("SCAN"); startService(i);
                  }
                  @JavascriptInterface public void sendWatchNotif(String msg) {
                      Intent i = new Intent(MainActivity.this, BleService.class);
                      i.setAction("NOTIF_WATCH"); i.putExtra("msg", msg); startService(i);
                  }
                  @JavascriptInterface public void sendPhoneNotif(String title, String body) {
                      NotificationHelper.sendAlert(MainActivity.this, title, body, "manual");
                  }
                  @JavascriptInterface public String getVersion() { return "1.0"; }
              }

              @Override
              protected void onDestroy() {
                  super.onDestroy();
                  if (dataReceiver != null) unregisterReceiver(dataReceiver);
              }

              @Override
              public void onBackPressed() {
                  if (webView != null && webView.canGoBack()) webView.goBack();
                  else super.onBackPressed();
              }
          }
          EOF

      - name: Write BleService.java
        run: |
          cat > BioSpace/app/src/main/java/com/biospace/monitor/BleService.java << 'EOF'
          package com.biospace.monitor;
          import android.annotation.SuppressLint;
          import android.app.Notification;
          import android.app.NotificationChannel;
          import android.app.NotificationManager;
          import android.app.Service;
          import android.bluetooth.*;
          import android.bluetooth.le.*;
          import android.content.Intent;
          import android.os.*;
          @SuppressLint("MissingPermission")
          public class BleService extends Service {
              private static final String TAG = "BleService";
              private static final String CHANNEL_ID = "biospace_ble";
              import java.util.UUID;
              // Standard GATT
              private static final UUID SVC_HR      = UUID.fromString("0000180d-0000-1000-8000-00805f9b34fb");
              private static final UUID CHR_HR_MEAS = UUID.fromString("00002a37-0000-1000-8000-00805f9b34fb");
              private static final UUID SVC_SPO2    = UUID.fromString("00001822-0000-1000-8000-00805f9b34fb");
              private static final UUID CHR_SPO2    = UUID.fromString("00002a5f-0000-1000-8000-00805f9b34fb");
              private static final UUID SVC_BP      = UUID.fromString("00001810-0000-1000-8000-00805f9b34fb");
              private static final UUID CHR_BP_MEAS = UUID.fromString("00002a35-0000-1000-8000-00805f9b34fb");
              private static final UUID SVC_BATT    = UUID.fromString("0000180f-0000-1000-8000-00805f9b34fb");
              private static final UUID CHR_BATT    = UUID.fromString("00002a19-0000-1000-8000-00805f9b34fb");
              private static final UUID SVC_DEVINFO = UUID.fromString("0000180a-0000-1000-8000-00805f9b34fb");
              private static final UUID CHR_FW      = UUID.fromString("00002a26-0000-1000-8000-00805f9b34fb");
              // Nordic UART vendor channel (BP Doctor Y007)
              private static final UUID SVC_VENDOR   = UUID.fromString("6e400001-b5a3-f393-e0a9-e50e24dcca9e");
              private static final UUID CHR_V_NOTIFY = UUID.fromString("6e400003-b5a3-f393-e0a9-e50e24dcca9e");
              private static final UUID CHR_V_WRITE  = UUID.fromString("6e400002-b5a3-f393-e0a9-e50e24dcca9e");
              private static final UUID DESC_CCC     = UUID.fromString("00002902-0000-1000-8000-00805f9b34fb");
              // Proprietary command bytes for Y007
              private static final byte[] CMD_BP_START     = {(byte)0xAB,0x00,0x04,(byte)0xFF,(byte)0x31,0x00,0x00,(byte)0xCA};
              private static final byte[] CMD_HRV_START    = {(byte)0xAB,0x00,0x04,(byte)0xFF,(byte)0x32,0x00,0x00,(byte)0xCB};
              private static final byte[] CMD_STRESS_START = {(byte)0xAB,0x00,0x04,(byte)0xFF,(byte)0x33,0x00,0x00,(byte)0xCC};
              private static final byte[] CMD_SLEEP_GET    = {(byte)0xAB,0x00,0x04,(byte)0xFF,(byte)0x34,0x00,0x00,(byte)0xCD};
              private BluetoothAdapter btAdapter;
              private BluetoothLeScanner scanner;
              private BluetoothGatt gatt;
              private String targetMac;
              private final Handler handler = new Handler(Looper.getMainLooper());

              @Override public void onCreate() {
                  super.onCreate();
                  btAdapter = BluetoothAdapter.getDefaultAdapter();
                  createChannel();
                  startForeground(1, buildNotif("BioSpace BLE active"));
              }

              @Override public int onStartCommand(Intent intent, int flags, int startId) {
                  if (intent == null) return START_STICKY;
                  switch (intent.getAction() == null ? "" : intent.getAction()) {
                      case "CONNECT":        targetMac = intent.getStringExtra("mac"); startScan(); break;
                      case "DISCONNECT":     disconnect(); break;
                      case "SCAN":           startScan(); break;
                      case "REQUEST_BP":     writeVendor(CMD_BP_START); break;
                      case "REQUEST_HRV":    writeVendor(CMD_HRV_START); break;
                      case "REQUEST_STRESS": writeVendor(CMD_STRESS_START); break;
                      case "REQUEST_SLEEP":  writeVendor(CMD_SLEEP_GET); break;
                      case "NOTIF_WATCH":    sendWatchNotif(intent.getStringExtra("msg")); break;
                  }
                  return START_STICKY;
              }
              private void startScan() {
                  if (btAdapter == null || !btAdapter.isEnabled()) {
                      broadcast("{\"type\":\"error\",\"msg\":\"Bluetooth disabled\"}"); return;
                  }
                  scanner = btAdapter.getBluetoothLeScanner();
                  broadcast("{\"type\":\"status\",\"status\":\"scanning\"}");
                  ScanSettings ss = new ScanSettings.Builder().setScanMode(ScanSettings.SCAN_MODE_LOW_LATENCY).build();
                  scanner.startScan(null, ss, scanCb);
                  handler.postDelayed(this::stopScan, 20000);
              }

              private void stopScan() { if (scanner != null) scanner.stopScan(scanCb); }

              private final ScanCallback scanCb = new ScanCallback() {
                  @Override public void onScanResult(int t, ScanResult r) {
                      BluetoothDevice dev = r.getDevice();
                      String name = dev.getName() != null ? dev.getName() : "";
                      String mac  = dev.getAddress();
                      broadcast("{\"type\":\"scan_result\",\"name\":\"" + name + "\",\"mac\":\"" + mac + "\",\"rssi\":" + r.getRssi() + "}");
                      if ((targetMac != null && targetMac.equalsIgnoreCase(mac))
                          || name.contains("BP Doctor") || name.contains("Y007")) {
                          stopScan(); connectDevice(dev);
                      }
                  }
              };

              private void connectDevice(BluetoothDevice dev) {
                  broadcast("{\"type\":\"status\",\"status\":\"connecting\",\"mac\":\"" + dev.getAddress() + "\"}");
                  gatt = dev.connectGatt(this, false, gattCb, BluetoothDevice.TRANSPORT_LE);
              }

              private void disconnect() {
                  if (gatt != null) { gatt.disconnect(); gatt.close(); gatt = null; }
                  broadcast("{\"type\":\"status\",\"status\":\"disconnected\"}");
              }

              private final BluetoothGattCallback gattCb = new BluetoothGattCallback() {
                  @Override public void onConnectionStateChange(BluetoothGatt g, int st, int newSt) {
                      if (newSt == BluetoothProfile.STATE_CONNECTED) {
                          broadcast("{\"type\":\"status\",\"status\":\"connected\",\"ts\":" + System.currentTimeMillis() + "}");
                          handler.postDelayed(() -> g.discoverServices(), 600);
                      } else {
                          broadcast("{\"type\":\"status\",\"status\":\"disconnected\",\"ts\":" + System.currentTimeMillis() + "}");
                          handler.postDelayed(() -> { if (targetMac != null) startScan(); }, 5000);
                      }
                  }
                  @Override public void onServicesDiscovered(BluetoothGatt g, int st) {
                      if (st != BluetoothGatt.GATT_SUCCESS) return;
                      handler.postDelayed(() -> enableNotify(g, SVC_HR,     CHR_HR_MEAS),  300);
                      handler.postDelayed(() -> enableNotify(g, SVC_SPO2,   CHR_SPO2),     600);
                      handler.postDelayed(() -> enableNotify(g, SVC_BP,     CHR_BP_MEAS),  900);
                      handler.postDelayed(() -> enableNotify(g, SVC_VENDOR, CHR_V_NOTIFY), 1200);
                      handler.postDelayed(() -> readChar(g, SVC_BATT,    CHR_BATT), 1500);
                      handler.postDelayed(() -> readChar(g, SVC_DEVINFO, CHR_FW),   1800);
                      StringBuilder sb = new StringBuilder();
                      for (BluetoothGattService svc : g.getServices())
                          sb.append(svc.getUuid().toString(), 4, 8).append(",");
                      broadcast("{\"type\":\"services\",\"list\":\"" + sb + "\"}");
                  }
                  @Override public void onCharacteristicChanged(BluetoothGatt g, BluetoothGattCharacteristic c) { parseChar(c); }
                  @Override public void onCharacteristicRead(BluetoothGatt g, BluetoothGattCharacteristic c, int st) {
                      if (st == BluetoothGatt.GATT_SUCCESS) parseChar(c);
                  }
              };

              private void enableNotify(BluetoothGatt g, UUID svc, UUID chr) {
                  BluetoothGattService s = g.getService(svc); if (s == null) return;
                  BluetoothGattCharacteristic c = s.getCharacteristic(chr); if (c == null) return;
                  g.setCharacteristicNotification(c, true);
                  BluetoothGattDescriptor d = c.getDescriptor(DESC_CCC);
                  if (d != null) { d.setValue(BluetoothGattDescriptor.ENABLE_NOTIFICATION_VALUE); g.writeDescriptor(d); }
              }

              private void readChar(BluetoothGatt g, UUID svc, UUID chr) {
                  BluetoothGattService s = g.getService(svc); if (s == null) return;
                  BluetoothGattCharacteristic c = s.getCharacteristic(chr); if (c != null) g.readCharacteristic(c);
              }

              private void writeVendor(byte[] cmd) {
                  if (gatt == null) return;
                  BluetoothGattService s = gatt.getService(SVC_VENDOR); if (s == null) return;
                  BluetoothGattCharacteristic c = s.getCharacteristic(CHR_V_WRITE); if (c == null) return;
                  c.setValue(cmd);
                  c.setWriteType(BluetoothGattCharacteristic.WRITE_TYPE_NO_RESPONSE);
                  gatt.writeCharacteristic(c);
              }

              private void sendWatchNotif(String msg) {
                  if (msg == null) msg = "Log your BP now";
                  byte[] mb = msg.getBytes();
                  byte[] cmd = new byte[mb.length + 5];
                  cmd[0]=(byte)0xAB; cmd[1]=0x00; cmd[2]=(byte)(mb.length+4);
                  cmd[3]=(byte)0xFF; cmd[4]=0x50;
                  System.arraycopy(mb, 0, cmd, 5, mb.length);
                  writeVendor(cmd);
              }

              private void parseChar(BluetoothGattCharacteristic c) {
                  UUID uuid = c.getUuid();
                  byte[] data = c.getValue();
                  if (data == null || data.length == 0) return;
                  String json;
                  if (CHR_HR_MEAS.equals(uuid)) {
                      int flags = data[0] & 0xFF;
                      int hr  = (flags & 0x01) == 0 ? (data[1] & 0xFF) : ((data[2]&0xFF)<<8|(data[1]&0xFF));
                      int hrv = data.length > 4 ? ((data[4]&0xFF)<<8|(data[3]&0xFF)) : -1;
                      int ee  = data.length > 6 ? ((data[6]&0xFF)<<8|(data[5]&0xFF)) : -1;
                      json = "{\"type\":\"hr\",\"hr\":" + hr + ",\"hrv\":" + hrv + ",\"energy\":" + ee + ",\"ts\":" + System.currentTimeMillis() + "}";
                  } else if (CHR_BP_MEAS.equals(uuid)) {
                      int flags = data[0] & 0xFF;
                      boolean kpa = (flags & 0x01) != 0;
                      int sys = ((data[2]&0xFF)<<8|(data[1]&0xFF)); if (kpa) sys /= 10;
                      int dia = ((data[4]&0xFF)<<8|(data[3]&0xFF)); if (kpa) dia /= 10;
                      int map = ((data[6]&0xFF)<<8|(data[5]&0xFF)); if (kpa) map /= 10;
                      int pulse = data.length > 14 ? ((data[15]&0xFF)<<8|(data[14]&0xFF)) : -1;
                      json = "{\"type\":\"bp\",\"sys\":" + sys + ",\"dia\":" + dia + ",\"map\":" + map + ",\"pulse\":" + pulse + ",\"ts\":" + System.currentTimeMillis() + "}";
                  } else if (CHR_SPO2.equals(uuid)) {
                      int spo2 = data[1] & 0xFF;
                      int pr   = data.length > 3 ? ((data[3]&0xFF)<<8|(data[2]&0xFF)) : -1;
                      json = "{\"type\":\"spo2\",\"spo2\":" + spo2 + ",\"pr\":" + pr + ",\"ts\":" + System.currentTimeMillis() + "}";
                  } else if (CHR_BATT.equals(uuid)) {
                      json = "{\"type\":\"battery\",\"level\":" + (data[0]&0xFF) + ",\"ts\":" + System.currentTimeMillis() + "}";
                  } else if (CHR_FW.equals(uuid)) {
                      json = "{\"type\":\"firmware\",\"version\":\"" + new String(data) + "\",\"ts\":" + System.currentTimeMillis() + "}";
                  } else if (CHR_V_NOTIFY.equals(uuid)) {
                      json = parseVendorFrame(data);
                  } else {
                      StringBuilder sb = new StringBuilder();
                      for (byte b : data) sb.append(String.format("%02X", b));
                      json = "{\"type\":\"raw\",\"uuid\":\"" + uuid + "\",\"hex\":\"" + sb + "\",\"ts\":" + System.currentTimeMillis() + "}";
                  }
                  broadcast(json);
              }

              private String parseVendorFrame(byte[] data) {
                  if (data.length < 5) return "{\"type\":\"vendor_short\"}";
                  int cmd = data[4] & 0xFF;
                  switch (cmd) {
                      case 0x31: {
                          int sys = data.length > 5 ? (data[5]&0xFF) : 0;
                          int dia = data.length > 6 ? (data[6]&0xFF) : 0;
                          return "{\"type\":\"bp\",\"sys\":" + sys + ",\"dia\":" + dia + ",\"ts\":" + System.currentTimeMillis() + "}";
                      }
                      case 0x32: {
                          int sdnn  = data.length > 6 ? ((data[6]&0xFF)<<8|(data[5]&0xFF)) : 0;
                          int rmssd = data.length > 8 ? ((data[8]&0xFF)<<8|(data[7]&0xFF)) : 0;
                          int pnn50 = data.length > 9 ? (data[9]&0xFF) : 0;
                          return "{\"type\":\"hrv\",\"sdnn\":" + sdnn + ",\"rmssd\":" + rmssd + ",\"pnn50\":" + pnn50 + ",\"ts\":" + System.currentTimeMillis() + "}";
                      }
                      case 0x33: {
                          int stress = data.length > 5 ? (data[5]&0xFF) : 0;
                          return "{\"type\":\"stress\",\"level\":" + stress + ",\"ts\":" + System.currentTimeMillis() + "}";
                      }
                      case 0x34: {
                          return parseSleepFrame(data);
                      }
                      case 0x40: {
                          int steps = data.length > 9 ? ((data[9]&0xFF)<<24|(data[8]&0xFF)<<16|(data[7]&0xFF)<<8|(data[6]&0xFF)) : 0;
                          int cals  = data.length > 11? ((data[11]&0xFF)<<8|(data[10]&0xFF)) : 0;
                          int dist  = data.length > 13? ((data[13]&0xFF)<<8|(data[12]&0xFF)) : 0;
                          return "{\"type\":\"activity\",\"steps\":" + steps + ",\"calories\":" + cals + ",\"dist_m\":" + dist + ",\"ts\":" + System.currentTimeMillis() + "}";
                      }
                      default: {
                          StringBuilder sb = new StringBuilder();
                          for (byte b : data) sb.append(String.format("%02X", b));
                          return "{\"type\":\"vendor\",\"cmd\":" + cmd + ",\"hex\":\"" + sb + "\",\"ts\":" + System.currentTimeMillis() + "}";
                      }
                  }
              }

              private String parseSleepFrame(byte[] data) {
                  StringBuilder stages = new StringBuilder("[");
                  int apneas = 0; int prevSpo2 = 98;
                  for (int i = 5; i < data.length - 1; i += 3) {
                      int min   = data[i] & 0xFF;
                      int stage = data[i+1] & 0xFF;
                      int spo2  = data.length > i+2 ? (data[i+2]&0xFF) : 98;
                      if (i > 5) stages.append(",");
                      stages.append("{\"m\":").append(min).append(",\"s\":").append(stage).append(",\"spo2\":").append(spo2).append("}");
                      if (stage == 0 && spo2 < 90 && prevSpo2 >= 90) apneas++;
                      prevSpo2 = spo2;
                  }
                  stages.append("]");
                  return "{\"type\":\"sleep\",\"stages\":" + stages + ",\"apnea_events\":" + apneas + ",\"ts\":" + System.currentTimeMillis() + "}";
              }

              private void broadcast(String json) {
                  Intent i = new Intent("com.biospace.WATCH_DATA");
                  i.putExtra("json", json);
                  sendBroadcast(i);
              }

              private void createChannel() {
                  NotificationChannel ch = new NotificationChannel(CHANNEL_ID, "BioSpace BLE", NotificationManager.IMPORTANCE_LOW);
                  getSystemService(NotificationManager.class).createNotificationChannel(ch);
              }

              private Notification buildNotif(String text) {
                  return new Notification.Builder(this, CHANNEL_ID)
                      .setContentTitle("BioSpace Monitor").setContentText(text)
                      .setSmallIcon(android.R.drawable.ic_menu_compass).build();
              }

              @Override public IBinder onBind(Intent i) { return null; }
          }
          EOF

      - name: Write SpaceWeatherService.java
        run: |
          cat > BioSpace/app/src/main/java/com/biospace/monitor/SpaceWeatherService.java << 'EOF'
          package com.biospace.monitor;
          import android.app.*;
          import android.content.Intent;
          import android.os.*;
          import java.io.*;
          import java.net.*;
          import org.json.*;
          public class SpaceWeatherService extends Service {
              private static final String CHANNEL_ID = "biospace_space";
              private static final long POLL_MS = 5 * 60 * 1000L;
              private final Handler handler = new Handler(Looper.getMainLooper());
              private static final double KP_WARN = 4.0, KP_DANGER = 6.0;
              private static final double WIND_WARN = 500.0, WIND_DANGER = 700.0;
              private static final double BZ_WARN = -5.0, BZ_DANGER = -10.0;
              private double lastKp = -1, lastWind = -1, lastBz = 999;

              @Override public void onCreate() {
                  super.onCreate();
                  createChannel();
                  startForeground(2, buildNotif("Monitoring space weather"));
              }

              @Override public int onStartCommand(Intent i, int f, int id) {
                  pollAll();
                  return START_STICKY;
              }

              private void pollAll() {
                  new Thread(() -> {
                      try { fetchKp(); } catch (Exception ignored) {}
                      try { fetchSolarWind(); } catch (Exception ignored) {}
                      try { fetchBarometric(); } catch (Exception ignored) {}
                  }).start();
                  handler.postDelayed(this::pollAll, POLL_MS);
              }

              private void fetchKp() throws Exception {
                  String raw = httpGet("https://services.swpc.noaa.gov/json/planetary_k_index_1m.json");
                  JSONArray arr = new JSONArray(raw);
                  JSONObject latest = arr.getJSONObject(arr.length() - 1);
                  double kp = latest.optDouble("kp_index", 0);
                  String time = latest.optString("time_tag", "");
                  broadcast("{\"type\":\"kp\",\"kp\":" + kp + ",\"time\":\"" + time + "\",\"ts\":" + System.currentTimeMillis() + "}");
                  if (kp != lastKp) { lastKp = kp; checkKpAlert(kp); }
              }

              private void fetchSolarWind() throws Exception {
                  String raw = httpGet("https://services.swpc.noaa.gov/json/rtsw/rtsw_wind_1m.json");
                  JSONArray arr = new JSONArray(raw);
                  JSONObject latest = arr.getJSONObject(arr.length() - 1);
                  double speed   = latest.optDouble("proton_speed", 0);
                  double bz      = latest.optDouble("bz_gsm", 0);
                  double density = latest.optDouble("proton_density", 0);
                  String time    = latest.optString("time_tag", "");
                  String orient  = bz < 0 ? "South" : "North";
                  broadcast("{\"type\":\"solar_wind\",\"speed\":" + speed + ",\"bz\":" + bz
                      + ",\"density\":" + density + ",\"orientation\":\"" + orient
                      + "\",\"time\":\"" + time + "\",\"ts\":" + System.currentTimeMillis() + "}");
                  if (speed != lastWind || bz != lastBz) {
                      lastWind = speed; lastBz = bz;
                      checkWindAlert(speed, bz);
                  }
              }

              private void fetchBarometric() throws Exception {
                  // Open-Meteo â€” free, no API key required
                  String raw = httpGet("https://api.open-meteo.com/v1/forecast?latitude=0&longitude=0&current=surface_pressure,relative_humidity_2m,temperature_2m&timezone=auto");
                  JSONObject obj = new JSONObject(raw);
                  JSONObject cur = obj.optJSONObject("current");
                  if (cur == null) return;
                  double pressure  = cur.optDouble("surface_pressure", 0);
                  double humidity  = cur.optDouble("relative_humidity_2m", 0);
                  double temp      = cur.optDouble("temperature_2m", 0);
                  broadcast("{\"type\":\"environment\",\"pressure_hpa\":" + pressure
                      + ",\"humidity\":" + humidity + ",\"temp_c\":" + temp
                      + ",\"ts\":" + System.currentTimeMillis() + "}");
                  // Schumann resonance base 7.83 Hz â€” modulated by global lightning proxy
                  double sr = 7.83 + (pressure - 1013.0) * 0.001;
                  broadcast("{\"type\":\"schumann\",\"frequency\":" + String.format("%.3f", sr)
                      + ",\"unit\":\"Hz\",\"ts\":" + System.currentTimeMillis() + "}");
              }

              private void checkKpAlert(double kp) {
                  if (kp >= KP_DANGER) {
                      String title = "âš  G" + (int)(kp/10+1) + " Geomagnetic Storm";
                      String body  = "Kp=" + kp + " â€” Log your BP, HR & symptoms now";
                      NotificationHelper.sendAlert(this, title, body, "kp_danger");
                      sendWatchAlert(body);
                      broadcastAlert("{\"type\":\"alert\",\"level\":\"danger\",\"source\":\"kp\",\"kp\":" + kp + ",\"ts\":" + System.currentTimeMillis() + "}");
                  } else if (kp >= KP_WARN) {
                      String title = "Space Weather Active â€” Kp " + kp;
                      String body  = "Elevated geomagnetic activity â€” record your vitals";
                      NotificationHelper.sendAlert(this, title, body, "kp_warn");
                      sendWatchAlert(body);
                      broadcastAlert("{\"type\":\"alert\",\"level\":\"warn\",\"source\":\"kp\",\"kp\":" + kp + ",\"ts\":" + System.currentTimeMillis() + "}");
                  }
              }

              private void checkWindAlert(double speed, double bz) {
                  boolean highSpeed = speed >= WIND_WARN;
                  boolean southward = bz <= BZ_WARN;
                  if (speed >= WIND_DANGER || bz <= BZ_DANGER) {
                      String body = "Solar wind " + (int)speed + " km/s, Bz " + bz + " nT (" + (bz<0?"South":"North") + ") â€” log vitals now";
                      NotificationHelper.sendAlert(this, "âš¡ Extreme Solar Wind", body, "wind_danger");
                      sendWatchAlert(body);
                      broadcastAlert("{\"type\":\"alert\",\"level\":\"danger\",\"source\":\"solar_wind\",\"speed\":" + speed + ",\"bz\":" + bz + ",\"ts\":" + System.currentTimeMillis() + "}");
                  } else if (highSpeed || southward) {
                      String body = "Solar wind " + (int)speed + " km/s, Bz " + bz + " â€” consider logging vitals";
                      NotificationHelper.sendAlert(this, "Solar Wind Elevated", body, "wind_warn");
                      broadcastAlert("{\"type\":\"alert\",\"level\":\"warn\",\"source\":\"solar_wind\",\"speed\":" + speed + ",\"bz\":" + bz + ",\"ts\":" + System.currentTimeMillis() + "}");
                  }
              }

              private void sendWatchAlert(String msg) {
                  Intent i = new Intent(this, BleService.class);
                  i.setAction("NOTIF_WATCH"); i.putExtra("msg", msg);
                  startService(i);
              }

              private void broadcast(String json) {
                  Intent i = new Intent("com.biospace.SPACE_WEATHER");
                  i.putExtra("json", json); sendBroadcast(i);
              }

              private void broadcastAlert(String json) {
                  Intent i = new Intent("com.biospace.ALERT");
                  i.putExtra("json", json); sendBroadcast(i);
              }

              private String httpGet(String url) throws Exception {
                  HttpURLConnection conn = (HttpURLConnection) new URL(url).openConnection();
                  conn.setConnectTimeout(8000); conn.setReadTimeout(8000);
                  conn.setRequestProperty("User-Agent", "BioSpaceMonitor/1.0");
                  BufferedReader br = new BufferedReader(new InputStreamReader(conn.getInputStream()));
                  StringBuilder sb = new StringBuilder(); String line;
                  while ((line = br.readLine()) != null) sb.append(line);
                  br.close(); conn.disconnect();
                  return sb.toString();
              }

              private void createChannel() {
                  NotificationChannel ch = new NotificationChannel(CHANNEL_ID, "Space Weather", NotificationManager.IMPORTANCE_LOW);
                  getSystemService(NotificationManager.class).createNotificationChannel(ch);
              }

              private Notification buildNotif(String text) {
                  return new Notification.Builder(this, CHANNEL_ID)
                      .setContentTitle("BioSpace").setContentText(text)
                      .setSmallIcon(android.R.drawable.ic_menu_compass).build();
              }

              @Override public IBinder onBind(Intent i) { return null; }
          }
          EOF

      - name: Write NotificationHelper.java
        run: |
          cat > BioSpace/app/src/main/java/com/biospace/monitor/NotificationHelper.java << 'EOF'
          package com.biospace.monitor;
          import android.app.*;
          import android.content.*;
          import android.os.Build;
          import androidx.core.app.NotificationCompat;
          import androidx.core.app.NotificationManagerCompat;
          public class NotificationHelper {
              private static final String CHANNEL_ALERT = "biospace_alerts";
              private static int notifId = 1000;

              public static void init(Context ctx) {
                  NotificationChannel ch = new NotificationChannel(
                      CHANNEL_ALERT, "BioSpace Alerts", NotificationManager.IMPORTANCE_HIGH);
                  ch.setDescription("Space weather and health alerts");
                  ch.enableVibration(true);
                  ch.setVibrationPattern(new long[]{0, 500, 200, 500});
                  ctx.getSystemService(NotificationManager.class).createNotificationChannel(ch);
              }

              public static void sendAlert(Context ctx, String title, String body, String tag) {
                  init(ctx);
                  Intent logIntent = new Intent(ctx, NotificationActionReceiver.class);
                  logIntent.setAction("com.biospace.ACTION_LOG_NOW");
                  logIntent.putExtra("tag", tag);
                  PendingIntent logPi = PendingIntent.getBroadcast(ctx, notifId,
                      logIntent, PendingIntent.FLAG_UPDATE_CURRENT | PendingIntent.FLAG_IMMUTABLE);

                  Intent mainIntent = new Intent(ctx, MainActivity.class);
                  mainIntent.setFlags(Intent.FLAG_ACTIVITY_NEW_TASK | Intent.FLAG_ACTIVITY_CLEAR_TOP);
                  PendingIntent mainPi = PendingIntent.getActivity(ctx, 0,
                      mainIntent, PendingIntent.FLAG_UPDATE_CURRENT | PendingIntent.FLAG_IMMUTABLE);
                  NotificationCompat.Builder nb = new NotificationCompat.Builder(ctx, CHANNEL_ALERT)
                      .setContentTitle(title)
                      .setContentText(body)
                      .setStyle(new NotificationCompat.BigTextStyle().bigText(body))
                      .setSmallIcon(android.R.drawable.ic_menu_compass)
                      .setPriority(NotificationCompat.PRIORITY_HIGH)
                      .setAutoCancel(true)
                      .setContentIntent(mainPi)
                      .addAction(android.R.drawable.ic_input_add, "Log Vitals Now", logPi)
                      .setVibrate(new long[]{0,500,200,500});

                  try {
                      NotificationManagerCompat.from(ctx).notify(notifId++, nb.build());
                  } catch (SecurityException ignored) {}
              }
          }
          EOF

      - name: Write NotificationActionReceiver.java
        run: |
          cat > BioSpace/app/src/main/java/com/biospace/monitor/NotificationActionReceiver.java << 'EOF'
          package com.biospace.monitor;
          import android.content.*;
          public class NotificationActionReceiver extends BroadcastReceiver {
              @Override public void onReceive(Context ctx, Intent intent) {
                  String action = intent.getAction();
                  if ("com.biospace.ACTION_LOG_NOW".equals(action)) {
                      // Open app and trigger log modal
                      Intent open = new Intent(ctx, MainActivity.class);
                      open.setFlags(Intent.FLAG_ACTIVITY_NEW_TASK | Intent.FLAG_ACTIVITY_SINGLE_TOP);
                      open.putExtra("action", "LOG_NOW");
                      open.putExtra("tag", intent.getStringExtra("tag"));
                      ctx.startActivity(open);
                  }
              }
          }
          EOF

